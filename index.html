<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pranay Netha
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,700&family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07080a;
    --surface: #0d0f12;
    --card: #111418;
    --card2: #161a1f;
    --border: #1c2128;
    --border2: #252c35;
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.10);
    --green-glow: rgba(34,197,94,0.18);
    --amber: #f59e0b;
    --amber-dim: rgba(245,158,11,0.10);
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #475569;
    --white: #f8fafc;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
    cursor: none;
  }

  /* ── CURSOR ── */
  #cur  { position:fixed; width:8px; height:8px; background:var(--green); border-radius:50%; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); }
  #ring { position:fixed; width:34px; height:34px; border:1px solid rgba(34,197,94,0.35); border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); transition:all 0.14s ease; }

  /* ── NAV ── */
  nav {
    position:fixed; top:0; left:0; right:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding:1.25rem 3.5rem;
    background:rgba(7,8,10,0.88);
    backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
  }
  .nav-logo {
    display:flex; align-items:center; gap:0.7rem;
    font-family:'DM Mono',monospace; font-size:0.72rem;
    letter-spacing:0.18em; text-transform:uppercase; color:var(--green);
  }
  .logo-dot { width:7px; height:7px; background:var(--green); border-radius:50%; animation:pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.35;transform:scale(0.65)} }
  .nav-links { display:flex; gap:2.5rem; list-style:none; }
  .nav-links a { font-family:'DM Mono',monospace; font-size:0.68rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--text3); text-decoration:none; transition:color 0.2s; }
  .nav-links a:hover { color:var(--green); }
  .nav-cta {
    font-family:'DM Mono',monospace; font-size:0.68rem; font-weight:500; letter-spacing:0.14em; text-transform:uppercase;
    background:var(--green); color:#07080a; padding:0.55rem 1.3rem; border-radius:3px; text-decoration:none; transition:opacity 0.2s;
    cursor:none;
  }
  .nav-cta:hover { opacity:0.88; }

  /* ── HERO ── */
  .hero {
    min-height:100vh; display:grid; grid-template-columns:1fr 1fr;
    align-items:center; padding:9rem 3.5rem 5rem; position:relative; overflow:hidden; gap:4rem;
  }
  .hero-glow {
    position:absolute; inset:0; pointer-events:none;
    background:
      radial-gradient(ellipse 55% 65% at 72% 48%, rgba(34,197,94,0.05) 0%, transparent 65%),
      radial-gradient(ellipse 35% 45% at 15% 80%, rgba(245,158,11,0.03) 0%, transparent 60%);
  }
  .hero-grid {
    position:absolute; inset:0; pointer-events:none;
    background-image: linear-gradient(rgba(34,197,94,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(34,197,94,0.03) 1px, transparent 1px);
    background-size:64px 64px;
    mask-image:radial-gradient(ellipse 85% 85% at 50% 50%, black 20%, transparent 100%);
  }

  .hero-left { position:relative; z-index:2; }

  .hero-eyebrow {
    display:inline-flex; align-items:center; gap:0.55rem;
    font-family:'DM Mono',monospace; font-size:0.62rem; letter-spacing:0.22em; text-transform:uppercase;
    color:var(--green); border:1px solid rgba(34,197,94,0.28); padding:0.38rem 0.9rem; border-radius:2px;
    margin-bottom:1.8rem; opacity:0; animation:up 0.7s 0.15s ease forwards;
  }
  .eyebrow-dot { width:5px; height:5px; background:var(--green); border-radius:50%; animation:pulse 2s infinite; }

  .hero-name {
    font-family:'Fraunces',serif; font-size:clamp(3.2rem,5.5vw,5rem);
    font-weight:900; line-height:1.02; letter-spacing:-0.025em; margin-bottom:0.3rem;
    opacity:0; animation:up 0.7s 0.32s ease forwards;
  }
  .hero-name .accent { color:var(--green); font-style:italic; font-weight:700; }

  .hero-title {
    font-family:'DM Mono',monospace; font-size:0.8rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--text3);
    margin-bottom:1.8rem; opacity:0; animation:up 0.7s 0.46s ease forwards;
  }

  .hero-desc {
    font-size:1rem; line-height:1.82; color:rgba(226,232,240,0.62); max-width:430px;
    margin-bottom:2.2rem; opacity:0; animation:up 0.7s 0.6s ease forwards;
  }
  .hero-desc strong { color:var(--text); font-weight:500; }

  /* ── proof bar ── */
  .proof-bar {
    display:flex; align-items:center; gap:1.8rem; margin-bottom:2.4rem;
    opacity:0; animation:up 0.7s 0.72s ease forwards;
  }
  .proof-item { display:flex; flex-direction:column; gap:2px; }
  .proof-num { font-family:'Fraunces',serif; font-size:1.5rem; font-weight:900; color:var(--green); line-height:1; }
  .proof-lbl { font-family:'DM Mono',monospace; font-size:0.58rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--text3); }
  .proof-divider { width:1px; height:36px; background:var(--border2); }

  .hero-cta { display:flex; gap:1rem; opacity:0; animation:up 0.7s 0.84s ease forwards; }
  .btn-fill {
    display:inline-flex; align-items:center; gap:0.5rem;
    background:var(--green); color:#07080a;
    font-family:'DM Mono',monospace; font-size:0.7rem; font-weight:500; letter-spacing:0.14em; text-transform:uppercase;
    padding:0.88rem 1.9rem; text-decoration:none; border-radius:3px; transition:all 0.22s; cursor:none;
  }
  .btn-fill:hover { opacity:0.88; transform:translateY(-2px); box-shadow:0 10px 32px rgba(34,197,94,0.22); }
  .btn-ghost {
    display:inline-flex; align-items:center; gap:0.5rem;
    border:1px solid var(--border2); color:var(--text2);
    font-family:'DM Mono',monospace; font-size:0.7rem; font-weight:400; letter-spacing:0.14em; text-transform:uppercase;
    padding:0.88rem 1.9rem; text-decoration:none; border-radius:3px; transition:all 0.22s; cursor:none;
  }
  .btn-ghost:hover { border-color:rgba(34,197,94,0.35); color:var(--green); background:var(--green-dim); transform:translateY(-2px); }

  @keyframes up   { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:none} }
  @keyframes fade { from{opacity:0} to{opacity:1} }

  /* ── PHONE MOCK ── */
  .hero-right { position:relative; z-index:2; display:flex; align-items:center; justify-content:center; opacity:0; animation:fade 0.9s 1s ease forwards; }
  .phone-wrap { position:relative; width:290px; }
  .phone-frame {
    width:218px; margin:0 auto; background:var(--card); border-radius:36px;
    border:2px solid rgba(34,197,94,0.22); overflow:hidden; position:relative;
    box-shadow:0 0 80px rgba(34,197,94,0.07), 0 40px 80px rgba(0,0,0,0.6);
  }
  .phone-notch {
    width:72px; height:22px; background:#07080a; border-radius:0 0 14px 14px;
    margin:0 auto 0; position:relative; z-index:2;
  }
  .phone-body { padding:10px 12px 18px; display:flex; flex-direction:column; gap:8px; }

  /* creator card inside phone */
  .creator-card {
    background:var(--card2); border:1px solid var(--border); border-radius:10px;
    padding:10px; display:flex; align-items:center; gap:9px;
  }
  .creator-avatar {
    width:34px; height:34px; border-radius:50%; flex-shrink:0;
    background:linear-gradient(135deg,#1e3a2f,#0f2d1a);
    display:flex; align-items:center; justify-content:center;
    font-family:'Fraunces',serif; font-size:0.85rem; color:var(--green); font-weight:700; border:1px solid rgba(34,197,94,0.25);
  }
  .creator-name { font-size:0.72rem; font-weight:500; color:var(--text); line-height:1.2; }
  .creator-sub  { font-family:'DM Mono',monospace; font-size:0.52rem; letter-spacing:0.08em; color:var(--text3); text-transform:uppercase; margin-top:2px; }
  .verified { color:var(--green); font-size:0.68rem; margin-left:3px; }

  /* reel preview */
  .reel-preview {
    background:linear-gradient(160deg,#0d1f17,#0a1610);
    border-radius:10px; border:1px solid var(--border);
    height:118px; display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden;
  }
  .reel-overlay-text {
    font-family:'Fraunces',serif; font-size:1.25rem; font-weight:900; color:rgba(34,197,94,0.18);
    text-align:center; line-height:1.1; user-select:none;
  }
  .reel-caption {
    position:absolute; bottom:0; left:0; right:0;
    background:rgba(34,197,94,0.92); padding:5px 8px;
    font-family:'DM Mono',monospace; font-size:0.58rem; font-weight:500;
    letter-spacing:0.06em; color:#07080a; text-align:center;
    animation:captionflash 4s ease-in-out infinite;
  }
  @keyframes captionflash {
    0%,15%{opacity:1} 40%,55%{opacity:0.2} 70%,100%{opacity:1}
  }
  .reel-progress { height:3px; background:rgba(255,255,255,0.08); border-radius:2px; overflow:hidden; }
  .reel-progress-fill { height:100%; background:var(--green); border-radius:2px; animation:prog 3s ease-in-out infinite alternate; }
  @keyframes prog { from{width:18%} to{width:92%} }

  /* metrics row */
  .metrics-row { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
  .metric-chip {
    background:var(--card2); border:1px solid var(--border); border-radius:8px;
    padding:7px 6px; text-align:center;
  }
  .metric-val { font-family:'Fraunces',serif; font-size:0.9rem; font-weight:700; color:var(--text); line-height:1; }
  .metric-lbl { font-family:'DM Mono',monospace; font-size:0.48rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--text3); margin-top:2px; }
  .metric-delta { font-family:'DM Mono',monospace; font-size:0.48rem; color:var(--green); margin-top:2px; }

  /* mini bar chart */
  .bars {
    display:flex; align-items:flex-end; gap:3px; height:32px; padding:0 2px;
    background:var(--card2); border:1px solid var(--border); border-radius:8px; overflow:hidden;
  }
  .bar { flex:1; border-radius:2px 2px 0 0; transition:opacity 0.3s; }

  /* floating tags */
  .ftag {
    position:absolute; background:var(--card); border:1px solid var(--border2); border-radius:8px;
    padding:0.5rem 0.85rem; font-family:'DM Mono',monospace; font-size:0.58rem; letter-spacing:0.08em;
    color:var(--text2); white-space:nowrap; box-shadow:0 6px 24px rgba(0,0,0,0.5);
  }
  .ftag-1 { top:-12px; left:-30px; animation:fl1 4.5s ease-in-out infinite; }
  .ftag-2 { bottom:20px; right:-42px; animation:fl2 5.2s ease-in-out infinite; }
  @keyframes fl1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
  @keyframes fl2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(7px)} }

  /* ── DIVIDER ── */
  .rule { width:100%; height:1px; background:linear-gradient(90deg,transparent,var(--border),transparent); }

  /* ── SECTIONS ── */
  .section { padding:6rem 3.5rem; max-width:1160px; margin:0 auto; }

  .eyebrow-sm {
    display:flex; align-items:center; gap:0.75rem;
    font-family:'DM Mono',monospace; font-size:0.62rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--green);
    margin-bottom:1rem;
  }
  .eyebrow-sm::before { content:''; width:28px; height:1px; background:var(--green); }

  .section-h {
    font-family:'Fraunces',serif; font-size:clamp(1.8rem,3.5vw,2.7rem);
    font-weight:700; line-height:1.18; margin-bottom:0.85rem;
  }
  .section-h em { color:var(--green); font-style:italic; }

  .section-sub { font-size:0.95rem; line-height:1.78; color:rgba(226,232,240,0.56); max-width:520px; }

  /* ── WHAT FINANCE CREATORS NEED ── */
  .needs-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:1.5px; margin-top:3rem; background:var(--border); border:1px solid var(--border); }
  .need-card {
    background:var(--card); padding:2.2rem 2rem; position:relative; overflow:hidden;
    transition:background 0.22s;
  }
  .need-card:hover { background:var(--card2); }
  .need-card::before {
    content:''; position:absolute; top:0; left:0; width:3px; height:100%;
    background:var(--green); transform:scaleY(0); transform-origin:top; transition:transform 0.3s ease;
  }
  .need-card:hover::before { transform:scaleY(1); }
  .need-num { font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:0.2em; color:var(--text3); margin-bottom:1rem; }
  .need-title { font-family:'Fraunces',serif; font-size:1.1rem; font-weight:700; margin-bottom:0.6rem; }
  .need-body { font-size:0.85rem; line-height:1.75; color:var(--text2); }
  .need-tag { display:inline-block; margin-top:0.9rem; font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:0.1em; color:var(--green); background:var(--green-dim); border:1px solid rgba(34,197,94,0.2); padding:0.28rem 0.7rem; border-radius:2px; }

  /* ── SERVICES ── */
  .services-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:3rem; }
  .svc-card {
    background:var(--card); border:1px solid var(--border); border-radius:4px;
    padding:2rem 1.8rem; display:flex; flex-direction:column; transition:border-color 0.22s, transform 0.22s;
    position:relative; overflow:hidden;
  }
  .svc-card:hover { border-color:rgba(34,197,94,0.35); transform:translateY(-4px); }
  .svc-card.featured { border-color:rgba(34,197,94,0.4); background:rgba(34,197,94,0.04); }
  .svc-badge {
    display:inline-block; font-family:'DM Mono',monospace; font-size:0.58rem; letter-spacing:0.14em;
    text-transform:uppercase; background:var(--green); color:#07080a; padding:0.25rem 0.65rem; border-radius:2px;
    margin-bottom:1.4rem; width:fit-content;
  }
  .svc-name { font-family:'Fraunces',serif; font-size:1.2rem; font-weight:700; margin-bottom:0.6rem; }
  .svc-desc { font-size:0.84rem; line-height:1.76; color:var(--text2); flex:1; margin-bottom:1.4rem; }
  .svc-list { list-style:none; margin-bottom:1.6rem; display:flex; flex-direction:column; gap:6px; }
  .svc-list li { font-size:0.82rem; color:var(--text2); display:flex; align-items:flex-start; gap:7px; line-height:1.5; }
  .svc-list li::before { content:'✓'; color:var(--green); font-size:0.78rem; flex-shrink:0; margin-top:1px; }
  .svc-price { font-family:'Fraunces',serif; font-size:1.5rem; font-weight:900; color:var(--green); }
  .svc-price-sub { font-family:'DM Mono',monospace; font-size:0.62rem; letter-spacing:0.08em; color:var(--text3); margin-top:2px; }
  .svc-cta {
    display:inline-block; margin-top:1.4rem; text-align:center; text-decoration:none;
    font-family:'DM Mono',monospace; font-size:0.68rem; letter-spacing:0.12em; text-transform:uppercase;
    padding:0.75rem; border-radius:3px; border:1px solid var(--border2); color:var(--text2); transition:all 0.2s; cursor:none;
  }
  .svc-cta:hover { border-color:rgba(34,197,94,0.4); color:var(--green); background:var(--green-dim); }
  .svc-card.featured .svc-cta { background:var(--green); color:#07080a; border-color:var(--green); }
  .svc-card.featured .svc-cta:hover { opacity:0.88; }

  /* ── PROCESS ── */
  .process-steps { display:grid; grid-template-columns:repeat(4,1fr); gap:1.5px; margin-top:3rem; background:var(--border); border:1px solid var(--border); }
  .step { background:var(--card); padding:2rem 1.7rem; }
  .step-num { font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:0.2em; color:var(--text3); margin-bottom:1.2rem; }
  .step-title { font-family:'Fraunces',serif; font-size:1rem; font-weight:700; margin-bottom:0.55rem; }
  .step-body { font-size:0.82rem; line-height:1.72; color:var(--text2); }
  .step-tool { display:inline-flex; align-items:center; gap:5px; margin-top:0.9rem; font-family:'DM Mono',monospace; font-size:0.58rem; letter-spacing:0.1em; color:var(--amber); background:var(--amber-dim); border:1px solid rgba(245,158,11,0.18); padding:0.25rem 0.65rem; border-radius:2px; }

  /* ── PORTFOLIO ── */
  .port-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:2.5rem; }
  .port-card {
    background:var(--card); border:1px solid var(--border); border-radius:4px; overflow:hidden;
    transition:transform 0.22s, box-shadow 0.22s; cursor:none;
  }
  .port-card:hover { transform:translateY(-5px); box-shadow:0 20px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(34,197,94,0.18); }
  .port-thumb {
    aspect-ratio:9/16; background:linear-gradient(155deg,#0d1a12,#0a1208);
    display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden;
  }
  .thumb-content { padding:1rem; width:100%; display:flex; flex-direction:column; justify-content:space-between; height:100%; }
  .thumb-tag { font-family:'DM Mono',monospace; font-size:0.52rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--green); opacity:0.7; }
  .thumb-hook {
    font-family:'Fraunces',serif; font-size:0.88rem; font-weight:700; color:var(--text); line-height:1.3;
    text-align:center; padding:0 0.3rem;
    background:rgba(34,197,94,0.06); border:1px solid rgba(34,197,94,0.12); border-radius:4px; padding:0.6rem 0.5rem;
  }
  .thumb-sub { font-family:'DM Mono',monospace; font-size:0.52rem; letter-spacing:0.1em; color:var(--green); opacity:0.6; text-align:right; }
  .play-btn {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(7,8,10,0.45); opacity:0; transition:opacity 0.2s;
  }
  .play-btn span { width:36px; height:36px; border:1.5px solid rgba(34,197,94,0.6); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.9rem; }
  .port-card:hover .play-btn { opacity:1; }
  .port-info { padding:0.9rem 1rem; border-top:1px solid var(--border); }
  .port-title { font-family:'Fraunces',serif; font-size:0.88rem; font-weight:700; margin-bottom:3px; }
  .port-meta { font-family:'DM Mono',monospace; font-size:0.58rem; letter-spacing:0.08em; color:var(--text3); text-transform:uppercase; }
  .port-views { font-family:'DM Mono',monospace; font-size:0.58rem; color:var(--green); letter-spacing:0.06em; }

  /* ── ABOUT ── */
  .about-grid { display:grid; grid-template-columns:1fr 1fr; gap:5rem; align-items:start; margin-top:3rem; }
  .about-text p { font-size:0.95rem; line-height:1.88; color:rgba(226,232,240,0.65); margin-bottom:1.1rem; }
  .about-text strong { color:var(--text); font-weight:500; }
  .skill-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:1.4rem; }
  .stag { font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--green); border:1px solid rgba(34,197,94,0.22); background:var(--green-dim); padding:0.32rem 0.78rem; border-radius:2px; }
  .about-stats { display:grid; grid-template-columns:1fr 1fr; gap:1.5px; background:var(--border); border:1px solid var(--border); }
  .a-stat { background:var(--card); padding:2rem; text-align:center; }
  .a-num { font-family:'Fraunces',serif; font-size:2.4rem; font-weight:900; color:var(--green); display:block; margin-bottom:4px; line-height:1; }
  .a-lbl { font-family:'DM Mono',monospace; font-size:0.58rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--text3); }

  /* ── WHAT YOU GET ── */
  .deliverables { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:2.5rem; }
  .deliv { background:var(--card); border:1px solid var(--border); border-radius:4px; padding:1.6rem; }
  .deliv-icon { font-size:1.4rem; margin-bottom:0.9rem; }
  .deliv-title { font-family:'Fraunces',serif; font-size:0.95rem; font-weight:700; margin-bottom:0.4rem; }
  .deliv-body { font-size:0.8rem; line-height:1.72; color:var(--text2); }

  /* ── CONTACT ── */
  .contact-wrap {
    background:var(--surface); border-top:1px solid var(--border); border-bottom:1px solid var(--border);
    padding:7rem 3.5rem; text-align:center; position:relative; overflow:hidden;
  }
  .contact-wrap::before {
    content:''; position:absolute; inset:0;
    background:radial-gradient(ellipse 50% 70% at 50% 50%, rgba(34,197,94,0.05) 0%, transparent 70%);
  }

<script>
  /* cursor */
  const cur = document.getElementById('cur');
  const ring = document.getElementById('ring');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove', e => {
    mx=e.clientX; my=e.clientY;
    cur.style.left=mx+'px'; cur.style.top=my+'px';
  });
  (function loop(){
    rx+=(mx-rx)*0.11; ry+=(my-ry)*0.11;
    ring.style.left=rx+'px'; ring.style.top=ry+'px';
    requestAnimationFrame(loop);
  })();
  document.querySelectorAll('a,button').forEach(el=>{
    el.addEventListener('mouseenter',()=>{ ring.style.transform='translate(-50%,-50%) scale(1.55)'; ring.style.borderColor='rgba(34,197,94,0.6)'; });
    el.addEventListener('mouseleave',()=>{ ring.style.transform='translate(-50%,-50%) scale(1)'; ring.style.borderColor='rgba(34,197,94,0.35)'; });
  });

  /* scroll reveal */
  const obs = new IntersectionObserver(entries=>{
    entries.forEach((e,i)=>{
      if(e.isIntersecting){ setTimeout(()=>e.target.classList.add('in'), i*70); obs.unobserve(e.target); }
    });
  },{threshold:0.12});
  document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
</script>
</body>
</html>
